name: Fork Build PBW

# Fork-friendly build: produces forecaswatch2-dev.pbw as a downloadable artifact.
# Runs on manual dispatch and on pushes to main (ignoring doc-only changes).
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up mise toolchain
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      - name: Install Pebble SDK
        run: scripts/ensure-pebble-sdk.sh

      - name: Build dev .pbw
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          mise build dev 2>&1 | tee build/build.log

      - name: Verify artifact exists
        run: test -f build/forecaswatch2-dev.pbw

      - name: Upload .pbw artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: forecaswatch2-dev-pbw
          path: build/forecaswatch2-dev.pbw
          if-no-files-found: error
          retention-days: 14
